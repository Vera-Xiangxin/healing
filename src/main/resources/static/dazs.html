<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<title>答案之书 & 赛博掷杯</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "微软雅黑", sans-serif;
			}

			body {
				background: #e6fffd;
			}

			.top-header {
				width: 100%;
				height: 70px;
				background: #40e9e0;
				display: flex;
				align-items: center;
				padding: 0 30px;
				position: fixed;
				top: 0;
				left: 0;
				z-index: 99;
				gap: 20px;
			}

			.logo-title {
				font-size: 24px;
				font-weight: bold;
				color: #fff;
				white-space: nowrap;
			}

			.search-bar {
				flex: 1;
				max-width: 600px;
				height: 40px;
				border-radius: 20px;
				border: none;
				padding: 0 20px;
				font-size: 16px;
			}

			.container {
				display: flex;
				margin-top: 70px;
			}

			.sidebar {
				width: 180px;
				background-color: #a0f7f2;
				min-height: calc(100vh - 70px);
				padding-top: 30px;
				position: fixed;
				left: 0;
				top: 70px;
			}
			
			.sidebar-item {
				font-size: 26px;
				padding: 18px 20px;
				color: #ffffff;
				cursor: pointer;
				transition: 0.2s;
				text-align: center;
			}
			
			.sidebar-item.active {
				color: #ffbc2e;
				font-weight: bold;
			}

			.main-content {
				margin-left: 360px;
				padding: 40px 60px;
				display: flex;
				gap: 100px;
				justify-content: center;
				align-items: flex-start;
			}

			.book-card {
				width: 360px;
				height: 480px;
				border-radius: 16px;
				background: #000;
				border: 4px solid #40e9e0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 30px;
				cursor: pointer;
				transition: transform 0.3s;
				position: relative;
				overflow: hidden;
			}

			.book-card:hover {
				transform: scale(1.03);
			}

			.book-bg {
				position: absolute;
				width: 100%;
				height: 100%;
				object-fit: cover;
				opacity: 0.8;
				top: 0;
				left: 0;
			}

			.book-title {
				font-size: 36px;
				color: #fff;
				font-weight: bold;
				margin-bottom: 20px;
				z-index: 2;
				text-align: center;
			}

			.book-desc {
				font-size: 22px;
				color: #fff;
				text-align: center;
				line-height: 1.6;
				z-index: 2;
			}


			.cup-container {
				width: 360px;
				height: 480px;
				border-radius: 16px;
				background: #000;
				border: 4px solid #40e9e0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 30px;
				cursor: pointer;
				transition: transform 0.3s;
				position: relative;
				overflow: hidden;
			}

			.cup-container:hover {
				transform: scale(1.03);
			}

			.cup-img {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				object-fit: cover;
				opacity: 0.8;
				transition: none;
			}

			.cup-title {
				font-size: 36px;
				color: #fff;
				font-weight: bold;
				margin-bottom: 20px;
				z-index: 2;
				text-align: center;
			}


			.cup-area {
				font-size: 22px;
				color: #fff;
				text-align: center;
				line-height: 1.6;
				z-index: 2;
			}

			.cup-result {
				font-size: 24px;
				color: #fff;
				font-weight: bold;
				text-shadow: 0 1px 2px black;
			}

			.cup-sub {
				font-size: 16px;
				color: #ffe6b3;
				margin-top: 8px;
				font-weight: bold;
			}

			.modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0, 0, 0, 0.5);
				z-index: 999;
				align-items: center;
				justify-content: center;
			}

			.modal-content {
				width: 500px;
				background: #fff;
				border: 3px solid #40e9e0;
				border-radius: 20px;
				padding: 40px;
				text-align: center;
			}

			.modal-title {
				font-size: 32px;
				color: #40a9ff;
				margin-bottom: 20px;
			}

			.modal-text {
				font-size: 22px;
				line-height: 1.8;
				margin-bottom: 30px;
			}

			.close-btn {
				padding: 12px 30px;
				background: #40e9e0;
				color: #fff;
				border: none;
				border-radius: 12px;
				font-size: 18px;
				cursor: pointer;
			}

			.highlight {
				background-color: #ffeb3b;
				transition: background 0.3s;
			}
		</style>
	</head>

						location.href = pageMap[text];
					});
				}
			});

			function searchPage() {
				const keyword = document.getElementById('searchInput').value.trim();
				if (!keyword) return;
				document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
				const mainArea = document.querySelector('.main-content');
				if (!mainArea) return;
				const walker = document.createTreeWalker(mainArea, NodeFilter.SHOW_TEXT, {
					acceptNode: (node) => {
						if (node.parentElement.tagName === 'SCRIPT' || node.parentElement.tagName === 'STYLE')
							return NodeFilter.FILTER_REJECT;
						return NodeFilter.FILTER_ACCEPT;
					}
				});
				let firstMatch = null;
				while (walker.nextNode()) {
					const node = walker.currentNode;
					if (node.textContent.toLowerCase().includes(keyword.toLowerCase())) {
						firstMatch = node.parentElement;
						break;
					}
				}
				if (firstMatch) {
					firstMatch.classList.add('highlight');
					firstMatch.scrollIntoView({
						behavior: 'smooth',
						block: 'center'
					});
				} else {
					alert('未找到相关内容');
				}
			}
			document.getElementById('searchInput').addEventListener('keypress', (e) => {
				if (e.key === 'Enter') searchPage();
			});
		</script>
